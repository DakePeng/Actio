name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · cargo + pnpm
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend
            backend/src-tauri

      # Linux build deps for cpal (ALSA), Tauri (GTK + WebKitGTK), and tray
      # support (libayatana-appindicator). Mirrors the list in
      # docs/dev-setup.md so CI failures point developers at the same fix.
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            cmake

      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        run: |
          # cmake is needed by llama-cpp-sys-2; everything else (clang,
          # CoreAudio, libtool) ships with Xcode Command Line Tools, which
          # macOS-latest runners already have.
          brew list cmake >/dev/null 2>&1 || brew install cmake

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Frontend tests
        working-directory: frontend
        run: pnpm test

      # actio-core builds against sherpa-onnx and llama-cpp-2 (large C++
      # dependencies). On a cold runner the build is slow; rust-cache above
      # speeds reruns. The library tests use an in-memory SQLite, no network.
      - name: Backend check
        working-directory: backend
        run: cargo check -p actio-core --tests

      - name: Backend tests
        working-directory: backend
        run: cargo test -p actio-core --lib

      - name: Backend clippy
        working-directory: backend
        run: cargo clippy -p actio-core --lib --tests -- -D warnings
